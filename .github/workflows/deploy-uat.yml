name: Deploy UAT web

on:
  push:
    branches: [uat]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-uat
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/uat'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: uat
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check out release candidate
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1 # v4.2.0
        with:
          version: 11.5.1
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release candidate
        run: pnpm verify

      - name: Pull Vercel UAT settings
        run: pnpm exec vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build immutable Vercel artifact
        run: pnpm exec vercel build --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt UAT artifact
        id: deploy
        shell: bash
        run: |
          deployment_url="$(pnpm exec vercel deploy --prebuilt --archive=tgz --token="${{ secrets.VERCEL_TOKEN }}")"
          case "$deployment_url" in
            https://*.vercel.app) ;;
            *) echo "Vercel did not return an expected deployment URL" >&2; exit 1 ;;
          esac
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
