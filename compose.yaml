name: liftoff-attendance

services:
  db:
    image: postgres:18-bookworm@sha256:1961f96e6029a02c3812d7cb329a3b03a3ac2bb067058dec17b0f5596aca9296
    environment:
      POSTGRES_DB: liftoff_attendance
      POSTGRES_USER: liftoff_app
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: '3'

  app:
    profiles: ['app']
    build:
      context: .
      target: runtime
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
      HOST: 0.0.0.0
      PORT: 3000
      ORIGIN: http://localhost:${APP_PORT:-3000}
    ports:
      - '127.0.0.1:${APP_PORT:-3000}:3000'
    secrets:
      - database_url
    depends_on:
      db:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s

  worker:
    profiles: ['worker']
    build:
      context: .
      target: runtime
    command: ['node', 'worker-build/worker.js']
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
      HEARTBEAT_FILE: /tmp/liftoff-worker-heartbeat
      PHASE3_EXTERNAL_EFFECTS: 'false'
    secrets:
      - database_url
    depends_on:
      db:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const fs=require('fs');const p='/tmp/liftoff-worker-heartbeat';const age=Date.now()-fs.statSync(p).mtimeMs;if(age>1200000)process.exit(1)",
        ]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 30s

secrets:
  database_url:
    file: ${DATABASE_URL_FILE:-/dev/null}
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:-/dev/null}

volumes:
  postgres_data:
